<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VM-Tips 2026 – Hyllie IK</title>
  <style>
    :root {
      --bg:          #194d38;
      --bg-deep:     #112e22;
      --card-bg:     #1f5c43;
      --card-border: #2a7a59;
      --green-accent:#5dceA0;
      --text:        #ffffff;
      --text-muted:  #93c4aa;
      --silver:      #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: transparent;
      padding: 28px 16px 8px;
      text-align: center;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 4px;
    }
    h1 {
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 800;
      color: #fff;
      letter-spacing: .02em;
      text-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .subtitle {
      font-size: clamp(11px, 3vw, 14px);
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── LEADERBOARD ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 12px 32px;
    }

    #leaderboard {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: clamp(14px, 3vw, 20px) clamp(12px, 3vw, 18px);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .row:hover, .row:active { background: #2a7a59; border-color: var(--green-accent); }

    .row.top1 { border-color: #d4af37; background: #163d2c; }
    .row.top2 { border-color: #a8a8a8; background: #1a4a35; }
    .row.top3 { border-color: #8c5a2a; background: #1a4a35; }

    .rank {
      font-size: clamp(20px, 5vw, 30px);
      min-width: clamp(32px, 7vw, 44px);
      text-align: center;
      font-weight: 800;
      color: var(--silver);
      flex-shrink: 0;
    }

    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      min-width: 0;
    }
    .namn {
      font-size: clamp(16px, 4.5vw, 24px);
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub {
      font-size: clamp(11px, 3vw, 14px);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: capitalize;
    }

    .pts {
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 800;
      color: var(--green-accent);
      min-width: clamp(40px, 10vw, 60px);
      text-align: right;
      flex-shrink: 0;
      line-height: 1;
    }
    .pts-unit {
      font-size: clamp(11px, 2.5vw, 14px);
      color: var(--text-muted);
      font-weight: 400;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: clamp(11px, 2.5vw, 13px);
    }

    /* ── DETAIL VIEW ── */
    #detail { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #ffffff;
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 600;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 12px;
      background: none;

      -webkit-tap-highlight-color: transparent;
    }

    .detail-header {
      margin-bottom: 16px;
    }
    .detail-header h2 {
      font-size: clamp(20px, 5vw, 28px);
      color: #fff;
      margin-bottom: 2px;
    }
    .detail-meta {
      font-size: clamp(12px, 3vw, 15px);

    }

    .tiebreak {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: var(--bg-deep);
      border: 1px solid var(--card-border);

    .tb-item { display: flex; flex-direction: column; gap: 4px; }
    .tb-label {
      font-size: clamp(9px, 2.5vw, 11px);
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
    }
    .tb-val {
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 700;
      color: #fff;
      text-transform: capitalize;
    }

    .section-title {
      font-size: clamp(10px, 2.5vw, 12px);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .match-list { display: flex; flex-direction: column; gap: 8px; }

    .mrow {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: clamp(10px, 2.5vw, 14px) clamp(10px, 3vw, 16px);

    .mrow.correct { border-color: #5dce90; background: #143d28; }
    .mrow.wrong   { border-color: #cc4444; background: #2e1010; }

    .mname {
      flex: 1;
      font-size: clamp(12px, 3vw, 15px);
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .mtip {
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 700;
      color: #fff;
      min-width: 28px;
      text-align: center;
    }
    .mfac {
      font-size: clamp(12px, 3vw, 15px);
      color: var(--text-muted);
      min-width: 28px;
      text-align: center;
    }
    .mic {
      font-size: clamp(14px, 3.5vw, 18px);
      min-width: 24px;
      text-align: center;
    }
    .dist {
      display: flex;
      gap: 6px;
      padding: 6px 0 2px;
      font-size: clamp(10px, 2.5vw, 12px);
      color: var(--text-muted);
    }
    .dist-item {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }
    .dist-label {
      font-weight: 700;
      min-width: 12px;
      color: var(--text);
    }
    .dist-bar-wrap {
      flex: 1;
      background: var(--card-border);
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
    }
    .dist-bar {
      height: 100%;
      border-radius: 3px;
      background: var(--green-accent);
      transition: width .3s;
    }
    .dist-pct {
      min-width: 28px;
      text-align: right;
    }

/* ── MATCH TIME IN DETAIL VIEW ── */
    .match-time-row {
      font-size: clamp(10px, 2.5vw, 12px);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .ch-logo-sm {
      height: 16px;
      max-width: 42px;
      width: auto;
      object-fit: contain;
      border-radius: 2px;
    }
  
    .ch-name {
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 700;
      color: var(--green-accent);
      letter-spacing: .03em;
    }
    .ch-name-sm {
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 700;
      color: var(--accent);
    }


    /* ── NEXT MATCH CARD ── */
    .next-match-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .next-match-label {
      font-size: clamp(9px, 2.5vw, 11px);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .next-match-name {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .next-match-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .next-match-time {
      font-size: clamp(12px, 3vw, 15px);
      color: var(--text-muted);
    }
    .next-match-dist {
      display: flex;
      gap: 8px;
    }
    .next-match-dist .dist-item {
      flex: 1;
    }
    /* ── MATCH TIME IN DETAIL VIEW ── */
    .match-time-row {
      font-size: clamp(10px, 2.5vw, 12px);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .ch-name {
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 700;
      color: var(--green-accent);
      letter-spacing: .03em;
    }
    .ch-name-sm {
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 700;
      color: var(--green-accent);
    }
    /* ── LOADING / ERROR ── */
    #status {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--card-border);
      border-top-color: var(--green-accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>⚽ VM-Tips 2026</h1>
  </div>
  <div class="subtitle">Hyllie IK · <span id="updated">Laddar...</span> tippare</div>
  <div class="subtitle" style="margin-top:4px">Tryck på ett namn för att se tipset i detalj</div>
</div>

<div class="container">
  <div id="status"><div class="spinner"></div>Hämtar resultat...</div>
  <div id="next-match-wrap" style="display:none"></div>
  <div id="search-wrap" style="display:none; margin-bottom:12px">
    <input id="search-box" type="search" placeholder="🔍  Sök namn..." autocomplete="off"
      oninput="renderLeaderboard(cachedScores, this.value)"
      style="width:100%;padding:12px 16px;font-size:16px;border-radius:12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);outline:none;-webkit-appearance:none">
  </div>
  <div id="leaderboard" style="display:none"></div>
  <div id="detail" style="display:none"></div>
</div>

<script>
const MATCH_SCHEDULE = [{"nr": 1, "name": "Brasilien \u2013 Marocko", "date": "2026-06-14", "time": "00:00", "ch": "svt1"}, {"nr": 2, "name": "Sverige \u2013 Tunisien", "date": "2026-06-15", "time": "04:00", "ch": "svt1"}, {"nr": 3, "name": "England \u2013 Kroatien", "date": "2026-06-17", "time": "22:00", "ch": "tv4"}, {"nr": 4, "name": "Nederl\u00e4nderna \u2013 Sverige", "date": "2026-06-20", "time": "19:00", "ch": "tv4"}, {"nr": 5, "name": "Tyskland \u2013 Elfenbenskusten", "date": "2026-06-20", "time": "22:00", "ch": "tv4"}, {"nr": 6, "name": "Argentina \u2013 \u00d6sterrike", "date": "2026-06-22", "time": "19:00", "ch": "svt1"}, {"nr": 7, "name": "Skottland \u2013 Brasilien", "date": "2026-06-25", "time": "00:00", "ch": "tv4"}, {"nr": 8, "name": "Japan \u2013 Sverige", "date": "2026-06-26", "time": "01:00", "ch": "svt1"}, {"nr": 9, "name": "Turkiet \u2013 USA", "date": "2026-06-26", "time": "04:00", "ch": "tv4"}, {"nr": 10, "name": "Norge \u2013 Frankrike", "date": "2026-06-26", "time": "21:00", "ch": "tv4"}, {"nr": 11, "name": "Uruguay \u2013 Spanien", "date": "2026-06-27", "time": "02:00", "ch": "tv4"}, {"nr": 12, "name": "Kroatien \u2013 Ghana", "date": "2026-06-27", "time": "23:00", "ch": "svt2"}, {"nr": 13, "name": "Colombia \u2013 Portugal", "date": "2026-06-28", "time": "01:30", "ch": "tv4"}];

const CHANNEL_LOGOS = {
  "svt1": "svt1.png",
  "svt2": "svt2.png",
  "svtplay": "svtplay.png",
  "tv4": "tv4.png",
  "tv4play": "tv4play.png",
};

const PLAY_CHANNEL = {"svt1": "svtplay", "svt2": "svtplay", "tv4": "tv4play"};

const CHANNEL_NAMES = {"svt1": "SVT1", "svt2": "SVT2", "tv4": "TV4"};

// ── CONFIG ──────────────────────────────────────────────────
const SHEET_ID    = '1J7nCfhfwEakhL4KiOMigoVIr0KlKBriUDH5-BSBZ2rk';
const SVAR_SHEET  = 'Formulärsvar 1';
const FACIT_SHEET = 'Facit';
const MATCH_COUNT = 13;

const COL_NAMN        = 2;
const COL_TIPSNUMMER  = 3;
const COL_MATCH_START = 5;
const COL_VMMASTARE   = 18;
const COL_SKYTTEKUNG  = 19;
const COL_MAL         = 20;
// ────────────────────────────────────────────────────────────

function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&cachebust=${Date.now()}`;
}

async function fetchSheet(sheetName) {
  const res  = await fetch(sheetUrl(sheetName));
  const text = await res.text();
  // Parse CSV — values are raw text, no type coercion
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        cols.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

function normalize(s) { return String(s || '').trim().toLowerCase(); }

function normalizeVal(s, emptyMeansX) {
  const v = String(s || '').trim().toUpperCase();
  if (v === '1' || v === '1.0') return '1';
  if (v === '2' || v === '2.0') return '2';
  if (v === 'X' || v === 'X.0' || v === 'x') return 'X';
  if (v === '' && emptyMeansX) return 'X'; // Google Forms stores X as empty cell
  return v;
}

let cachedScores     = [];
let cachedMatchNames = [];
let cachedFacitRow   = [];
let currentFilter    = '';

async function loadData() {
  const [svarRows, facitRows] = await Promise.all([
    fetchSheet(SVAR_SHEET),
    fetchSheet(FACIT_SHEET)
  ]);

  const svarHeaders = svarRows[0] || [];
  cachedMatchNames  = svarHeaders.slice(COL_MATCH_START, COL_MATCH_START + MATCH_COUNT)
    .map(h => h.replace(/^Matchresultat\s*\[/, '').replace(/\]$/, ''));

  const facitData       = (facitRows.length > 1 ? facitRows[1] : null) || new Array(16).fill('');
  cachedFacitRow        = facitData;
  window._cachedFacitRow = facitData;
  const facitMatches = facitData.slice(0, MATCH_COUNT).map(v => {
    const s = String(v || '').trim();
    return s === '' ? '' : normalizeVal(s, true);
  });
  const facitMastare    = normalize(facitData[MATCH_COUNT]     || '');
  const facitSkyttekung = normalize(facitData[MATCH_COUNT + 1] || '');
  const facitMal        = parseFloat(facitData[MATCH_COUNT + 2]) || NaN;

  const results = [];
  for (let i = 1; i < svarRows.length; i++) {
    const row  = svarRows[i];
    const namn       = (row[COL_NAMN] || '').trim();
    if (!namn) continue;
    const tipsnr     = (row[COL_TIPSNUMMER] || '').trim();
    const uniqueKey  = tipsnr ? namn + '||' + tipsnr : namn;

    let poang = 0;
    const matchDetaljer = [];
    for (let m = 0; m < MATCH_COUNT; m++) {
      const raw  = String(row[COL_MATCH_START + m] || '').trim();
      const svar = normalizeVal(raw, true); // empty = X in player answers
      const facit = facitMatches[m];
      const ratt  = facit !== '' && svar === facit;
      if (ratt) poang++;
      matchDetaljer.push({ svar, facit, ratt });
    }

    const vmMastare   = normalize(row[COL_VMMASTARE]  || '');
    const skyttekung  = normalize(row[COL_SKYTTEKUNG] || '');
    const malGissning = parseFloat(row[COL_MAL]) || 0;
    const malDiff     = isNaN(malGissning) || isNaN(facitMal) ? 999999 : Math.abs(malGissning - facitMal);

    results.push({
      namn, uniqueKey, tipsnr, poang, matchDetaljer,
      vmMastare, skyttekung, malGissning, malDiff,
      rattVmMastare:   facitMastare    !== '' && vmMastare   === facitMastare,
      rattSkyttekung:  facitSkyttekung !== '' && skyttekung  === facitSkyttekung,
    });
  }

  results.sort((a, b) => {
    if (b.poang !== a.poang) return b.poang - a.poang;
    if (a.rattVmMastare  !== b.rattVmMastare)  return b.rattVmMastare  - a.rattVmMastare;
    if (a.rattSkyttekung !== b.rattSkyttekung) return b.rattSkyttekung - a.rattSkyttekung;
    return a.malDiff - b.malDiff;
  });

  // Assign rank with ties — same rank if equal on all tiebreakers
  let rank = 1;
  for (let i = 0; i < results.length; i++) {
    if (i > 0) {
      const a = results[i - 1], b = results[i];
      const tied = a.poang === b.poang &&
                   a.rattVmMastare   === b.rattVmMastare &&
                   a.rattSkyttekung  === b.rattSkyttekung &&
                   a.malDiff         === b.malDiff;
      if (!tied) rank = i + 1;
    }
    results[i].rank = rank;
  }

  cachedScores = results;
  return results;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getMedal(rank, poang) {
  if (poang === 0) return '';
  if (rank === 1) return '🥇';
  if (rank === 2) return '🥈';
  if (rank === 3) return '🥉';
  return '';
}

function getTopClass(rank, poang) {
  if (poang === 0) return '';
  if (rank === 1) return ' top1';
  if (rank === 2) return ' top2';
  if (rank === 3) return ' top3';
  return '';
}

function getDatetimeStr(match) {
  // e.g. "2026-06-14" + "00:00" => date string for display
  const days = ['sön','mån','tis','ons','tor','fre','lör'];
  const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const d = new Date(match.date + 'T' + match.time + ':00');
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + match.time;
}

function renderNextMatch(scores) {
  const wrap = document.getElementById('next-match-wrap');
  const now  = new Date();

  // Find first match without facit result (not yet decided)
  const facitData = (window._cachedFacitRow || []);
  let nextIdx = -1;
  for (let i = 0; i < MATCH_SCHEDULE.length; i++) {
    const facit = String(facitData[i] || '').trim();
    if (facit === '') { nextIdx = i; break; }
  }
  // Fallback: if facit not loaded yet, use time-based
  if (nextIdx === -1 && facitData.length === 0) {
    for (let i = 0; i < MATCH_SCHEDULE.length; i++) {
      const matchTime = new Date(MATCH_SCHEDULE[i].date + 'T' + MATCH_SCHEDULE[i].time + ':00');
      if (matchTime > now) { nextIdx = i; break; }
    }
  }

  if (nextIdx === -1) {
    wrap.style.display = 'none';
    return;
  }

  const match = MATCH_SCHEDULE[nextIdx];
  const dist  = calcDist(nextIdx);
  const chLogo    = CHANNEL_LOGOS[match.ch] || '';
  const playKey   = PLAY_CHANNEL[match.ch];
  const playLogo  = playKey ? CHANNEL_LOGOS[playKey] : '';
  const timeStr   = getDatetimeStr(match);

  wrap.style.display = 'block';
  wrap.innerHTML = `<div class="next-match-card">
    <div class="next-match-label">⚽ Nästa match · Match ${match.nr} av 13</div>
    <div class="next-match-name">${match.name}</div>
    <div class="next-match-meta">
      <span class="next-match-time">${timeStr}</span>
<span class="ch-name">${CHANNEL_NAMES[match.ch] || match.ch.toUpperCase()}</span>
    </div>
    <div class="next-match-dist">
      <div class="dist-item">
        <span class="dist-label">1</span>
        <div class="dist-bar-wrap"><div class="dist-bar" style="width:${dist['1']}%"></div></div>
        <span class="dist-pct">${dist['1']}%</span>
      </div>
      <div class="dist-item">
        <span class="dist-label">X</span>
        <div class="dist-bar-wrap"><div class="dist-bar" style="width:${dist['X']}%"></div></div>
        <span class="dist-pct">${dist['X']}%</span>
      </div>
      <div class="dist-item">
        <span class="dist-label">2</span>
        <div class="dist-bar-wrap"><div class="dist-bar" style="width:${dist['2']}%"></div></div>
        <span class="dist-pct">${dist['2']}%</span>
      </div>
    </div>
  </div>`;
}

function renderLeaderboard(scores, filter) {
  if (filter !== undefined) currentFilter = filter;

  const lb     = document.getElementById('leaderboard');
  const detail = document.getElementById('detail');
  const search = document.getElementById('search-box');
  detail.style.display = 'none';
  lb.style.display     = 'flex';
  document.getElementById('search-wrap').style.display = 'block';
  renderNextMatch(scores);

  // Restore filter input value
  if (search) search.value = currentFilter;

  const filtered = currentFilter
    ? scores.filter(s => s.namn.toLowerCase().includes(currentFilter.toLowerCase()))
    : scores;

  if (filtered.length === 0) {
    lb.innerHTML = `<div class="empty">${currentFilter ? 'Ingen med det namnet hittades.' : 'Inga svar inkomna än.'}</div>`;
    return;
  }

  lb.innerHTML = filtered.map((s, i) => {
    const medal    = getMedal(s.rank, s.poang);
    const topClass = getTopClass(s.rank, s.poang);
    const rankDisp = medal || s.rank;
    return `<div class="row${topClass}" onclick="showDetail('${esc(s.uniqueKey)}')">
      <span class="rank">${rankDisp}</span>
      <span class="info">
        <span class="namn">${esc(s.namn)}${nameCount[s.namn] > 1 && s.tipsnr ? ' <span style="font-size:.75em;opacity:.6">('+esc(s.tipsnr)+')</span>' : ''}</span>
        <span class="sub">${esc(s.vmMastare)} · ${esc(s.skyttekung)} · ${s.malGissning} mål</span>
      </span>
      <span class="pts">${s.poang}<br><span class="pts-unit">rätt</span></span>
    </div>`;
  }).join('');
}

function calcDist(matchIndex) {
  const counts = { '1': 0, 'X': 0, '2': 0 };
  let total = 0;
  cachedScores.forEach(s => {
    const svar = s.matchDetaljer[matchIndex]?.svar;
    if (svar && counts[svar] !== undefined) {
      counts[svar]++;
      total++;
    }
  });
  return {
    '1': total ? Math.round(counts['1'] / total * 100) : 0,
    'X': total ? Math.round(counts['X'] / total * 100) : 0,
    '2': total ? Math.round(counts['2'] / total * 100) : 0,
    total
  };
}

function calcDist(matchIndex) {
  const counts = { '1': 0, 'X': 0, '2': 0 };
  let total = 0;
  cachedScores.forEach(s => {
    const svar = s.matchDetaljer[matchIndex]?.svar;
    if (svar && counts[svar] !== undefined) {

    'X': total ? Math.round(counts['X'] / total * 100) : 0,

  };
}

function showDetail(namn) {
  const s = cachedScores.find(x => x.uniqueKey === namn);
  if (!s) return;

  const lb  = document.getElementById('leaderboard');
  const det = document.getElementById('detail');
  document.getElementById('search-wrap').style.display  = 'none';
  document.getElementById('next-match-wrap').style.display = 'none';

  lb.style.display  = 'none';
  det.style.display = 'block';

  const matchRows = s.matchDetaljer.map((m, i) => {
    const speladAv = m.facit !== '';
    const icon     = !speladAv ? '⏳' : m.ratt ? '✅' : '❌';
    const facitTxt = speladAv ? m.facit : '–';
    const cls      = !speladAv ? 'mrow pending' : m.ratt ? 'mrow correct' : 'mrow wrong';
    const dist     = calcDist(i);
    const sched    = MATCH_SCHEDULE[i];
    const timeStr  = sched ? getDatetimeStr(sched) : '';
    const chName   = sched ? (CHANNEL_NAMES[sched.ch] || sched.ch.toUpperCase()) : '';
    return `<div class="${cls}">
      <div style="flex:1;min-width:0">
        <div class="match-time-row">
          <span>${timeStr}</span>
          <span class="ch-name-sm">${chName}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="mname">${esc(cachedMatchNames[i] || (i+1) + '. Match')}</span>
          <span class="mtip">${m.svar || '–'}</span>
          <span class="mfac">${facitTxt}</span>
          <span class="mic">${icon}</span>
        </div>
        <div class="dist">
          <div class="dist-item">
            <span class="dist-label">1</span>
            <div class="dist-bar-wrap"><div class="dist-bar" style="width:${dist['1']}%"></div></div>
            <span class="dist-pct">${dist['1']}%</span>
          </div>
          <div class="dist-item">
            <span class="dist-label">X</span>
            <div class="dist-bar-wrap"><div class="dist-bar" style="width:${dist['X']}%"></div></div>
            <span class="dist-pct">${dist['X']}%</span>
          </div>
          <div class="dist-item">
            <span class="dist-label">2</span>
            <div class="dist-bar-wrap"><div class="dist-bar" style="width:${dist['2']}%"></div></div>
            <span class="dist-pct">${dist['2']}%</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  det.innerHTML = `
    <button class="back-btn" onclick="renderLeaderboard(cachedScores)">← Tillbaka</button>
    <div class="detail-header">
      <h2>${esc(s.namn)}</h2>
      <div class="detail-meta">#${s.rank} · ${s.poang} rätta av ${MATCH_COUNT}</div>
    </div>
    <div class="tiebreak">
      <div class="tb-item"><span class="tb-label">VM-mästare</span><span class="tb-val">${esc(s.vmMastare) || '–'}</span></div>
      <div class="tb-item"><span class="tb-label">Skyttekung</span><span class="tb-val">${esc(s.skyttekung) || '–'}</span></div>
      <div class="tb-item"><span class="tb-label">Antal mål</span><span class="tb-val">${s.malGissning || '–'}</span></div>
    </div>
    <p class="section-title">Matchresultat</p>
    <div class="match-list">${matchRows}</div>`;
}

async function refresh() {
  try {
    const scores = await loadData();
    document.getElementById('status').style.display = 'none';
    document.getElementById('updated').textContent  = scores.length;

    if (document.getElementById('detail').style.display !== 'block') {
      renderLeaderboard(scores);
    } else {
      cachedScores = scores;
    }
  } catch (err) {
    document.getElementById('status').innerHTML =
      '<p style="color:#c06060">Kunde inte hämta data.<br><small>' + err.message + '</small></p>';
    document.getElementById('status').style.display = 'block';
  }
}

refresh();
</script>
